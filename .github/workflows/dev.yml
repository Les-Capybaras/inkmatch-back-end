name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Build and start services
        run: docker compose up -d --build

      - name: Audit Packages
        run: docker exec inkmatch-back-end-api-1 npm audit

      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Run tests
        run: |
          docker exec inkmatch-back-end-database-1 mysql -u root -pChangeMe! -e "CREATE DATABASE IF NOT EXISTS inkmatch_test;"
          cd /api
          npm run test
